<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&family=Roboto:ital,wght@0,100..900;1,100..900&family=Tiny5&family=Ubuntu:ital,wght@0,300;0,400;0,500;0,700;1,300;1,400;1,500;1,700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="calculator.css" />
    <script src="script.js" defer></script>
  </head>
  <body>
    <div class="calculator">
      <div class="input-row">
        <span id="calculation"></span>
        <input type="text" class="display" id="calculator-input" readonly />
      </div>
      <div class="keys">
        <button class="clear" onclick="onCleanClick()">AC</button>
        <button class="operator" onclick="onActionClick('/')">/</button>
        <button class="operator" onclick="onActionClick('x')">x</button>
        <button onclick="onNumberClick(7)">7</button>
        <button onclick="onNumberClick(8)">8</button>
        <button onclick="onNumberClick(9)">9</button>
        <button class="operator" onclick="onActionClick('-')">-</button>
        <button onclick="onNumberClick(4)">4</button>
        <button onclick="onNumberClick(5)">5</button>
        <button onclick="onNumberClick(6)">6</button>
        <button class="operator" onclick="onActionClick('+')">+</button>
        <button onclick="onNumberClick(1)">1</button>
        <button onclick="onNumberClick(2)">2</button>
        <button onclick="onNumberClick(3)">3</button>
        <button class="equal" onclick="onCountClick('')">=</button>
        <button class="zero" onclick="onNumberClick(0)">0</button>
        <button class="operator" onclick="onNumberClick('.')">.</button>
      </div>
      <div class="history">
        <div class="history-btn">
          <button id="show-history" disabled>Show history</button>
          <button id="clear-history" class="hidden">Clear history</button>
        </div>
      </div>
      <div class="history-items"></div>
    </div>
  </body>
</html>
